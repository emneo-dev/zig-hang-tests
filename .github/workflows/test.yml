on:
  workflow_dispatch:
    inputs:
      ZIGVER:
        description: "zig version to target"
        required: true

run-name: '${{ inputs.ZIGVER }}'
jobs:
  do_the_thing:
    runs-on: ubuntu-latest
    steps:
      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ inputs.ZIGVER }}
      - run: zig init
      - run: zig build
      - run: zig build run
